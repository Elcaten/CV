name: Build and deploy resume

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render (HTML + PDF) via Docker
        run: |
          mkdir -p dist
          docker run --rm \
            -v "$PWD":/work -w /work \
            ghcr.io/rendercv/rendercv \
            render Andrei_Lineishchikov_CV.yaml \
            --pdf-path dist/Andrei_Lineishchikov_CV.pdf \
            --html-path dist/Andrei_Lineishchikov_CV.html \
            --output-folder dist
          rm -f dist/*.md dist/*.typ dist/*_*.png

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

