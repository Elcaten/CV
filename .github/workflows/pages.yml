name: Build and deploy resume

on:
  push:
    # Repo default branch is `main`; keep `master` too just in case.
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render (HTML + PDF) via Docker
        run: |
          mkdir -p dist
          docker run --rm \
            --user "$(id -u)":"$(id -g)" \
            -e HOME=/tmp \
            -e XDG_CACHE_HOME=/tmp/.cache \
            -e XDG_CONFIG_HOME=/tmp/.config \
            -e XDG_DATA_HOME=/tmp/.local/share \
            -v "$PWD":/work -w /work \
            ghcr.io/rendercv/rendercv \
            render Andrei_Lineishchikov_CV.yaml \
            --pdf-path dist/Andrei_Lineishchikov_CV.pdf \
            --html-path dist/Andrei_Lineishchikov_CV.html \
            --output-folder dist
          rm -f dist/*.md dist/*.typ dist/*_*.png

      - name: Add index.html redirect to PDF
        run: |
          cat << 'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=./Andrei_Lineishchikov_CV.pdf">
            <title>Andrei Lineishchikov - CV</title>
            <script>location.replace("./Andrei_Lineishchikov_CV.pdf");</script>
          </head>
          <body>
            <p>Redirecting to <a href="./Andrei_Lineishchikov_CV.pdf">CV (PDF)</a>...</p>
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
